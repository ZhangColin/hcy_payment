server:
  port: 8081

spring:
  application:
    name: aieducenter-payment

  # 激活的配置（默认 local，部署时通过环境变量覆盖）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Flyway 配置
  flyway:
    enabled: false  # 禁用自动配置，使用 FlywayConfig 手动配置多实例

  # 数据源驱动
  datasource:
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none  # 暂时禁用验证
    show-sql: false

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
